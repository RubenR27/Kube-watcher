apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-watcher
  namespace: kube-watcher
  labels:
    app: kube-watcher
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-watcher
  template:
    metadata:
      labels:
        app: kube-watcher
    spec:
      serviceAccountName: kube-watcher
      containers:
      - name: kube-watcher
        image: rupolaso/kube-watcher-image:v1
        ports:
        - containerPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: kube-watcher-service
  namespace: kube-watcher
spec:
  type: NodePort
  selector:
    app: kube-watcher
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007