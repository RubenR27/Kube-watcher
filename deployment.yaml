apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-watcher
  namespace: kube-watcher
  labels:
    app: kube-watcher
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-watcher
  template:
    metadata:
      labels:
        app: kube-watcher
    spec:
      serviceAccountName: kube-watcher
      automountServiceAccountToken: true
      containers:
      - name: kube-watcher
        image: rupolaso/kube-watcher-image:v10
        env:
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: kube-watcher-config
              key: API_URL
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: kube-watcher-service
  namespace: kube-watcher
spec:
  type: NodePort
  selector:
    app: kube-watcher
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007